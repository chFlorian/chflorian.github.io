<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog — Flo Writes Code</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="bg-blue-50 text-gray-900 font-sans">
    <header class="bg-white shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="../index.html" class="text-2xl font-bold text-blue-600 hover:underline">Flo Writes Code</a>
        <nav class="space-x-4">
          <a href="../index.html#about" class="hover:underline text-blue-600">About</a>
          <a href="index.html" class="hover:underline text-blue-600 font-semibold">Blog</a>
          <a href="../index.html#youtube" class="hover:underline text-blue-600">YouTube</a>
          <a href="../index.html#apps" class="hover:underline text-blue-600">Apps</a>
        </nav>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-16">
      <h1 class="text-4xl font-bold text-blue-800 mb-4">Blog</h1>
      <p class="text-lg text-gray-600 mb-12">SwiftUI, iOS development, and indie app building.</p>

      <div id="blog-posts" class="space-y-6">
        <p class="text-gray-500">Loading…</p>
      </div>

      <section id="sponsor-section" class="mt-5 hidden">
        <div id="sponsor-slot"></div>
      </section>
    <script type="application/json" id="sponsor-data">{"default":{"icon":"https://launchbuddy.app/appicon.png","title":"LaunchBuddy","message":"The only project manager made for indie developers","url":"https://launchbuddy.app"},"sponsors":[],"current":null,"history":[]}</script>
    <script type="application/json" id="blog-posts-data">
[
  {
    "slug": "stop-using-observableobject",
    "title": "Stop Using ObservableObject",
    "date": "2026-03-17",
    "excerpt": "ObservableObject introduces side effects and performance problems, but there's an alternative."
  }
]
    </script>
    <script>
      (function () {
        var container = document.getElementById('blog-posts');
        function render(posts) {
          if (!posts || posts.length === 0) {
            container.innerHTML = '<p class="text-gray-500">No posts yet.</p>';
            return;
          }
          var html = posts.map(function (post) {
            var dateFormatted = new Date(post.date + 'T12:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            var imgHtml = post.heroImage
              ? '<img src="' + post.slug + '/' + post.heroImage + '" alt="" class="w-full h-48 object-cover bg-blue-100" onerror="this.style.display=\'none\'">'
              : '';
            return '<article class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">' +
              '<a href="' + encodeURIComponent(post.slug) + '/" class="block">' +
              imgHtml +
              '<div class="p-6">' +
              '<time class="text-sm text-gray-500" datetime="' + post.date + '">' + dateFormatted + '</time>' +
              '<h2 class="text-xl font-bold text-blue-800 mt-2 hover:underline">' + post.title + '</h2>' +
              '<p class="text-gray-600 mt-2">' + post.excerpt + '</p>' +
              '</div></a></article>';
          }).join('');
          container.innerHTML = html;
        }
        function filterPublished(posts) {
          return (posts || []).filter(function (p) { return !p.archived; });
        }
        var el = document.getElementById('blog-posts-data');
        if (el && el.textContent) {
          try {
            render(filterPublished(JSON.parse(el.textContent)));
          } catch (e) {
            container.innerHTML = '<p class="text-gray-500">Could not load posts.</p>';
          }
        } else {
          var postsUrl = new URL('posts.json', window.location.href).href;
          fetch(postsUrl)
            .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
            .then(function (data) { return filterPublished(data); })
            .then(render)
            .catch(function () { container.innerHTML = '<p class="text-gray-500">Could not load posts.</p>'; });
        }
      })();

      (function () {
        var slot = document.getElementById('sponsor-slot');
        var section = document.getElementById('sponsor-section');
        if (!slot || !section) return;

        function todayISO() {
          return new Date().toISOString().slice(0, 10);
        }

        function pickSponsor(data) {
          if (!data || typeof data !== 'object') return null;
          var today = todayISO();

          // New format: { default, sponsors: [...] }
          var sponsors = Array.isArray(data.sponsors) ? data.sponsors.slice() : [];

          if (sponsors.length) {
            sponsors.sort(function (a, b) {
              var as = a.startDate || '';
              var bs = b.startDate || '';
              if (as < bs) return 1;
              if (as > bs) return -1;
              return 0;
            });
            for (var i = 0; i < sponsors.length; i++) {
              var s = sponsors[i];
              if (!s.startDate || !s.endDate) continue;
              if (s.startDate <= today && today <= s.endDate) {
                return s;
              }
            }
          }

          if (data.default && data.default.title) return data.default;
          if (data.current && data.current.title) return data.current;
          return null;
        }

        function renderSponsor(sponsor) {
          if (!sponsor || !sponsor.title) return;
          var html = '<aside class="sponsor-box flex items-center gap-4 p-4 rounded-xl border border-blue-200 bg-blue-50/80">';
          html += '<img src="' + (sponsor.icon || '') + '" alt="" class="w-12 h-12 rounded-lg flex-shrink-0 object-cover" onerror="this.style.display=\'none\'">';
          html += '<div class="min-w-0 flex-1">';
          html += '<div class="font-semibold text-blue-800">' + sponsor.title + '</div>';
          html += '<p class="text-sm text-gray-600 mt-0.5">' + (sponsor.message || '') + '</p>';
          html += '</div>';
          html += '</aside>';
          if (sponsor.url) {
            slot.innerHTML = '<a href="' + sponsor.url + '" target="_blank" rel="noopener noreferrer" class="block">' + html + '</a>';
          } else {
            slot.innerHTML = html;
          }
          section.classList.remove('hidden');
        }

        var el = document.getElementById('sponsor-data');
        if (el && el.textContent) {
          try {
            var data = JSON.parse(el.textContent);
            var s = pickSponsor(data);
            if (s) renderSponsor(s);
          } catch (e) {}
        }
        var url = new URL('sponsors.json', window.location.href).href;
        fetch(url).then(function (r) { return r.ok ? r.json() : Promise.reject(); }).then(function (data) {
          var s = pickSponsor(data);
          if (s) renderSponsor(s);
        }).catch(function () {});
      })();
    </script>
    </main>

    <footer class="py-6 bg-white text-center text-sm text-blue-800 mt-12">
      <p>&copy; 2025 Flo Writes Code. <a href="../index.html" class="hover:underline">Back to home</a></p>
    </footer>
  </body>
</html>
