<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}} — Flo Writes Code</title>
    <meta name="description" content="{{excerpt}}" />
    <meta name="author" content="Flo Writes Code" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="Flo Writes Code" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{excerpt}}" />
    <meta property="og:url" content="{{canonicalUrl}}" />
    <meta property="og:image" content="{{socialImageUrl}}" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:description" content="{{excerpt}}" />
    <meta name="twitter:image" content="{{socialImageUrl}}" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/xcode.min.css" rel="stylesheet">
    <style>
      .prose pre { margin: 1rem 0; }
      .prose pre code { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.875rem; line-height: 1.5; padding: 0; background: transparent; }
      .prose pre { padding: 0; background: #fff; border: 1px solid #e5e7eb; }
      .prose pre code.hljs { padding: 1.25rem 1.5rem; border-radius: 0.75rem; display: block; overflow-x: auto; }
      .prose img { border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
  </head>
  <body class="bg-blue-50 text-gray-900 font-sans">
    <header class="bg-white shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="../../index.html" class="text-2xl font-bold text-blue-600 hover:underline">Flo Writes Code</a>
        <nav class="space-x-4">
          <a href="/" class="hover:underline text-blue-600">Home</a>
          <a href="/sponsor.html" class="hover:underline text-blue-600">Sponsor</a>
          <a href="/blog" class="hover:underline text-blue-600 font-semibold">Blog</a>
        </nav>
      </div>
    </header>

    <article class="max-w-3xl mx-auto px-4 py-12">
      <a href="../index.html" class="inline-flex items-center text-blue-600 hover:underline text-sm mb-8">← Back to Blog</a>

      <header class="mb-10">
        <time class="text-sm text-gray-500" datetime="{{date}}">{{dateFormatted}}</time>
        <h1 class="text-4xl font-bold text-blue-800 mt-2">{{title}}</h1>
        <p class="text-xl text-gray-600 mt-4">{{excerpt}}</p>
      </header>

      <div class="prose prose-lg max-w-none">
        <p class="text-gray-700 leading-relaxed">{{body}}</p>

        <div id="sponsor-slot"></div>
      </div>
    </article>

    <footer class="py-6 bg-white text-center text-sm text-blue-800 mt-12">
      <p>&copy; 2025 Flo Writes Code. <a href="../../index.html" class="hover:underline">Back to home</a> · <a href="../index.html" class="hover:underline">Blog</a></p>
    </footer>
    <script type="application/json" id="sponsor-data">{"default":{"icon":"https://launchbuddy.app/appicon.png","title":"LaunchBuddy","message":"The only project manager made for indie developers","url":"https://launchbuddy.app"},"sponsors":[],"current":null,"history":[]}</script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/swift.min.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        if (!window.hljs) return;
        document.querySelectorAll('pre code').forEach(function (el) {
          window.hljs.highlightElement(el);
        });
      });
    </script>
    <script>
      (function () {
        var slot = document.getElementById('sponsor-slot');
        if (!slot) return;

        function todayISO() {
          return new Date().toISOString().slice(0, 10);
        }

        function pickSponsor(data) {
          if (!data || typeof data !== 'object') return null;
          var today = todayISO();
          var sponsors = Array.isArray(data.sponsors) ? data.sponsors.slice() : [];

          if (sponsors.length) {
            sponsors.sort(function (a, b) {
              var as = a.startDate || '';
              var bs = b.startDate || '';
              if (as < bs) return 1;
              if (as > bs) return -1;
              return 0;
            });
            for (var i = 0; i < sponsors.length; i++) {
              var s = sponsors[i];
              if (!s.startDate || !s.endDate) continue;
              if (s.startDate <= today && today <= s.endDate) {
                return s;
              }
            }
          }

          if (data.default && data.default.title) return data.default;
          if (data.current && data.current.title) return data.current;
          return null;
        }

        function render(sponsor) {
          if (!sponsor || !sponsor.title) return;
          var html = '<aside class="sponsor-box flex items-center gap-4 p-4 rounded-xl border border-blue-200 bg-blue-50/80 my-8">';
          html += '<img src="' + (sponsor.icon || '') + '" alt="" class="w-12 h-12 rounded-lg flex-shrink-0 object-cover" onerror="this.style.display=\'none\'">';
          html += '<div class="min-w-0 flex-1">';
          html += '<div class="font-semibold text-blue-800">' + sponsor.title + '</div>';
          html += '<p class="text-sm text-gray-600 mt-0.5">' + (sponsor.message || '') + '</p>';
          html += '</div>';
          html += '</aside>';
          if (sponsor.url) {
            slot.innerHTML = '<a href="' + sponsor.url + '" target="_blank" rel="noopener noreferrer" class="block">' + html + '</a>';
          } else {
            slot.innerHTML = html;
          }
        }

        var el = document.getElementById('sponsor-data');
        if (el && el.textContent) {
          try {
            var data = JSON.parse(el.textContent);
            var s = pickSponsor(data);
            if (s) render(s);
          } catch (e) {}
        }
        var url = new URL('../sponsors.json', window.location.href).href;
        fetch(url).then(function (r) { return r.ok ? r.json() : Promise.reject(); }).then(function (data) {
          var s = pickSponsor(data);
          if (s) render(s);
        }).catch(function () {});
      })();
    </script>
  </body>
</html>
